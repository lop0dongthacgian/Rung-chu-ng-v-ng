  <script src="questions.js"></script>
  <style>
    :root{
      --gold:#FFD700;--gold2:#FFA500;
      --dark:#0d1b2a;--dark2:#1b2d45;--dark3:#243858;
      --green:#23d160;--red:#ff3860;
      --text:#f0f4ff;--text2:#9ab0cc;
      --border:rgba(255,255,255,0.1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Nunito',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;
      background-image:radial-gradient(ellipse at 20% 10%,rgba(255,165,0,.1) 0%,transparent 55%),
                       radial-gradient(ellipse at 80% 90%,rgba(35,209,96,.06) 0%,transparent 55%)}

    .stars{position:fixed;inset:0;z-index:0;pointer-events:none}
    .star{position:absolute;border-radius:50%;background:#fff;opacity:0;animation:tw var(--d) var(--dl) infinite}
    @keyframes tw{0%,100%{opacity:0}50%{opacity:var(--o)}}
    .page{position:relative;z-index:1;min-height:100vh}

    /* LOGIN */
    .login-wrap{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
    .login-card{background:var(--dark2);border:1px solid var(--border);border-radius:24px;padding:44px 34px;
      width:100%;max-width:390px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,.4)}
    .login-bell{font-size:64px;display:inline-block;animation:sway 2s ease-in-out infinite;margin-bottom:6px}
    @keyframes sway{0%,100%{transform:rotate(-10deg)}50%{transform:rotate(10deg)}}
    .login-title{font-family:'Baloo 2',cursive;font-size:28px;font-weight:800;color:var(--gold)}
    .login-sub{color:var(--text2);font-size:13px;margin:6px 0 22px}
    .pw-wrap{position:relative;margin-bottom:10px}
    .pw-wrap input{width:100%;padding:13px 46px 13px 16px;border-radius:11px;border:2px solid var(--border);
      background:var(--dark3);color:var(--text);font-size:15px;font-family:'Nunito',sans-serif;transition:border-color .2s}
    .pw-wrap input:focus{outline:none;border-color:var(--gold)}
    .pw-eye{position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;
      font-size:18px;color:var(--text2);user-select:none;transition:color .2s}
    .pw-eye:hover{color:var(--gold)}
    .plain-input{width:100%;padding:13px 16px;border-radius:11px;border:2px solid var(--border);
      background:var(--dark3);color:var(--text);font-size:15px;font-family:'Nunito',sans-serif;
      margin-bottom:10px;transition:border-color .2s}
    .plain-input:focus{outline:none;border-color:var(--gold)}
    .btn-join{width:100%;padding:14px;border-radius:11px;border:none;cursor:pointer;
      background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);
      font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;transition:transform .15s,box-shadow .15s}
    .btn-join:hover{transform:translateY(-2px);box-shadow:0 0 20px rgba(255,215,0,.5)}
    .err{color:var(--red);font-size:13px;font-weight:700;margin-top:8px;min-height:18px}
    .hint{margin-top:14px;padding:10px 14px;border-radius:10px;background:rgba(255,255,255,.05);
      color:var(--text2);font-size:12px;line-height:1.7}

    /* HEADER */
    #gamePanel{display:none}
    .hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;
      background:var(--dark2);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
    .hdr-name{font-family:'Baloo 2',cursive;font-size:17px;font-weight:800;color:var(--gold)}
    .hdr-score{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--dark);
      font-family:'Baloo 2',cursive;font-size:18px;font-weight:800;padding:6px 18px;border-radius:50px}

    .body{padding:16px;max-width:680px;margin:0 auto}

    /* BELL */
    .bell-area{display:flex;flex-direction:column;align-items:center;margin:6px 0 18px}
    .bell-wrap{width:170px;height:170px;position:relative;display:flex;
      align-items:center;justify-content:center;cursor:not-allowed;
      -webkit-tap-highlight-color:transparent}
    .bell-img{width:100%;height:100%;object-fit:contain;transition:filter .3s;
      filter:grayscale(80%) brightness(.45);
      user-select:none;pointer-events:none;display:block}

    .bell-wrap.s-wait  .bell-img{filter:grayscale(80%) brightness(.45)}
    .bell-wrap.s-ready .bell-img{
      filter:drop-shadow(0 0 20px rgba(35,209,96,.9)) brightness(1.15);
      animation:swayB .85s ease-in-out infinite}
    .bell-wrap.s-mine  .bell-img{
      filter:drop-shadow(0 0 28px rgba(255,215,0,1)) brightness(1.2);
      animation:ringH .18s ease-in-out infinite}
    .bell-wrap.s-other .bell-img{filter:grayscale(100%) brightness(.25)}

    .bell-wrap.s-ready{cursor:pointer}

    @keyframes swayB{0%,100%{transform:rotate(-8deg)}50%{transform:rotate(8deg)}}
    @keyframes ringH{0%,100%{transform:rotate(-16deg) scale(1.1)}50%{transform:rotate(16deg) scale(1.1)}}

    .ripple{position:absolute;border-radius:50%;pointer-events:none;
      background:rgba(35,209,96,.15);display:none;
      animation:rpl 1.1s ease-out infinite}
    .bell-wrap.s-ready .ripple{display:block}
    @keyframes rpl{0%{width:70px;height:70px;opacity:.7}100%{width:250px;height:250px;opacity:0}}

    .bell-status{margin-top:11px;padding:9px 24px;border-radius:50px;font-weight:800;
      font-size:14px;transition:all .3s;background:rgba(255,255,255,.06);color:var(--text2);text-align:center}
    .bell-status.c-ready{background:rgba(35,209,96,.15);color:var(--green)}
    .bell-status.c-mine {background:rgba(255,215,0,.15); color:var(--gold)}
    .bell-status.c-other{background:rgba(255,56,96,.1);  color:var(--red)}

    /* QUESTION */
    .q-wrap{background:rgba(255,255,255,.05);border:1px solid var(--border);
      border-radius:16px;padding:18px;margin-bottom:12px}
    .q-num{display:inline-block;background:var(--gold);color:var(--dark);
      font-family:'Baloo 2',cursive;font-size:11px;font-weight:800;
      padding:3px 11px;border-radius:20px;margin-bottom:9px}
    .q-text{font-size:18px;font-weight:800;line-height:1.5}

    .opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:11px}
    .opt{background:var(--dark3);border:2px solid var(--border);border-radius:11px;
      padding:12px 13px;font-size:14px;font-weight:700;cursor:not-allowed;
      display:flex;align-items:center;gap:8px;user-select:none;transition:all .18s}
    .opt .lbl{min-width:26px;height:26px;border-radius:6px;background:rgba(255,215,0,.12);
      color:var(--gold);font-family:'Baloo 2',cursive;font-weight:800;font-size:12px;
      display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .opt.can-pick{cursor:pointer}
    .opt.can-pick:hover{border-color:var(--gold);background:rgba(255,215,0,.08);transform:translateY(-2px)}
    .opt.picked{border-color:var(--gold);background:rgba(255,215,0,.12)}
    .opt.locked{opacity:.35;cursor:not-allowed}

    .fb{padding:14px;border-radius:11px;font-family:'Baloo 2',cursive;
      font-size:18px;font-weight:800;text-align:center;display:none;margin-top:9px}
    .fb.ok {display:block;background:rgba(35,209,96,.15);color:var(--green);border:1.5px solid rgba(35,209,96,.4)}
    .fb.bad{display:block;background:rgba(255,56,96,.12);color:var(--red);  border:1.5px solid rgba(255,56,96,.3)}

    /* SCORES MINI */
    .scores-mini{background:rgba(255,255,255,.04);border:1px solid var(--border);
      border-radius:13px;padding:14px;margin-top:12px}
    .scores-mini-title{font-size:11px;font-weight:800;color:var(--text2);
      text-transform:uppercase;letter-spacing:1px;margin-bottom:9px}
    .score-row{display:flex;justify-content:space-between;align-items:center;
      padding:6px 9px;border-radius:7px;margin-bottom:4px;background:rgba(255,255,255,.03)}
    .score-row.me    {background:rgba(255,215,0,.1)}
    .score-row.ringer{background:rgba(255,107,53,.15)}
    .score-row-name{font-weight:700;font-size:13px}
    .score-row-pts {font-family:'Baloo 2',cursive;font-weight:800;font-size:16px;color:var(--gold)}

    .wait-box{text-align:center;padding:24px 16px;color:var(--text2);font-size:14px;line-height:1.8}
    .wait-box .ico{font-size:40px;margin-bottom:9px;animation:bob 2s ease-in-out infinite;display:block}
    @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

    /* RESULT SCREEN */
    .result-screen{padding:16px;animation:fadeUp .4s ease}
    @keyframes fadeUp{0%{opacity:0;transform:translateY(20px)}100%{opacity:1;transform:translateY(0)}}
    .result-header{text-align:center;margin-bottom:20px}
    .result-trophy{font-size:72px;display:block;animation:bob 1.5s ease-in-out infinite;margin-bottom:4px}
    .result-title-cl{font-family:'Baloo 2',cursive;font-size:32px;font-weight:800;color:var(--gold);
      text-shadow:0 0 20px rgba(255,215,0,.5)}
    .result-sub-cl{font-size:13px;color:var(--text2);margin-top:4px}
    .result-tbl{width:100%;border-collapse:separate;border-spacing:0 7px}
    .result-tbl thead th{font-size:10px;text-transform:uppercase;letter-spacing:1px;
      color:var(--text2);font-weight:700;padding:0 12px 2px}
    .result-tbl tbody tr{background:rgba(255,255,255,.06);border-radius:12px}
    .result-tbl tbody tr.rk-1{background:linear-gradient(135deg,rgba(255,215,0,.2),rgba(255,165,0,.1));
      border:1.5px solid rgba(255,215,0,.4);box-shadow:0 0 16px rgba(255,215,0,.15)}
    .result-tbl tbody tr.rk-2{background:rgba(192,192,192,.1);border:1.5px solid rgba(192,192,192,.25)}
    .result-tbl tbody tr.rk-3{background:rgba(205,127,50,.1);border:1.5px solid rgba(205,127,50,.25)}
    .result-tbl tbody tr.rk-me{outline:2px solid rgba(255,215,0,.6)}
    .result-tbl td{padding:12px;font-size:14px;font-weight:700}
    .result-tbl td:first-child{border-radius:12px 0 0 12px;width:44px;text-align:center;font-size:20px}
    .result-tbl td:last-child{border-radius:0 12px 12px 0;text-align:right;font-family:'Baloo 2',cursive;font-size:18px;color:var(--gold)}
    .result-tbl td.rn{text-align:left;font-size:14px}
    .my-badge{display:inline-block;background:rgba(255,215,0,.2);color:var(--gold);
      font-size:10px;font-weight:800;padding:1px 7px;border-radius:10px;margin-left:6px;vertical-align:middle}
    .conf-wrap{pointer-events:none;position:fixed;inset:0;z-index:200;overflow:hidden}
    .cf{position:absolute;top:-10px;border-radius:2px;animation:cffall linear forwards}
    @keyframes cffall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(110vh) rotate(540deg)}}

    @media(max-width:480px){
      .opts{grid-template-columns:1fr}
      .bell-wrap{width:145px;height:145px}
      .result-title-cl{font-size:26px}
    }
  </style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="page">

  <!-- LOGIN -->
  <div id="loginWrap" class="login-wrap">
    <div class="login-card">
      <div class="login-bell">🔔</div>
      <div class="login-title">RUNG CHUÔNG VÀNG</div>
      <div class="login-sub">Nhập tên và mật khẩu để tham gia</div>
      <input class="plain-input" id="inpName" type="text" placeholder="Tên của bạn" maxlength="20"
             onkeydown="if(event.key==='Enter')document.getElementById('inpPass').focus()">
      <div class="pw-wrap">
        <input id="inpPass" type="password" placeholder="Mật khẩu (VD: 1234561)"
               onkeydown="if(event.key==='Enter')doLogin()">
        <span class="pw-eye" onclick="togglePw('inpPass',this)">👁</span>
      </div>
      <button class="btn-join" onclick="doLogin()">🎮 THAM GIA</button>
      <div class="err" id="errMsg"></div>
      <div class="hint">Mật khẩu: <strong>1234561</strong> → <strong>1234566</strong><br>Mỗi số chỉ dùng được 1 lần cùng lúc</div>
    </div>
  </div>

  <!-- GAME -->
  <div id="gamePanel">
    <div class="hdr">
      <div class="hdr-name">🎮 <span id="hdrName">Người chơi</span></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="hdr-score" id="hdrScore">0 điểm</div>
        <button onclick="doLogout()" style="padding:7px 14px;border-radius:20px;border:1.5px solid rgba(255,255,255,.2);background:rgba(255,255,255,.08);color:#9ab0cc;font-size:12px;font-weight:700;cursor:pointer;font-family:'Nunito',sans-serif">🚪 Thoát</button>
      </div>
    </div>
    <div class="body">

      <!-- CHUÔNG -->
      <div class="bell-area">
        <div class="bell-wrap s-wait" id="bellWrap" onclick="onBellClick()">
          <div class="ripple"></div>
          <img class="bell-img" id="bellImg" src="chuong.png" alt="Chuông">
        </div>
        <div class="bell-status" id="bellStatus">⏳ Đang kết nối...</div>
      </div>

      <!-- NỘI DUNG -->
      <div id="content">
        <div class="wait-box">
          <span class="ico">🔔</span>
          Chờ Admin bắt đầu trò chơi...
        </div>
      </div>

    </div>
  </div>

</div>
<div class="conf-wrap" id="confWrap"></div>
<audio id="snd" src="chuong.mp3" preload="auto"></audio>

<script>
/* STARS */
(()=>{
  const c=document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div');s.className='star';
    const z=Math.random()*2+.5;
    s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*4}s;--dl:${Math.random()*4}s;--o:${.1+Math.random()*.5}`;
    c.appendChild(s);
  }
})();

/* ─── STATE ─── */
const GAME_ID='current_game';
let me=null;
let gs=null;
let canRing=false;
let canAnswer=false;
let answered=false;
let myPickedIdx=null;

// FIX: scorePerQ đồng bộ từ server thay vì hardcode
let scorePerQ=10;

/* ─── HELPERS ─── */
function togglePw(id,eye){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  eye.textContent=el.type==='password'?'👁':'🙈';
}

/* ─── ĐĂNG NHẬP ─── */
async function doLogin(){
  const name=document.getElementById('inpName').value.trim();
  const pass=document.getElementById('inpPass').value.trim();
  const err=document.getElementById('errMsg');
  err.textContent='';

  if(!name){err.textContent='⚠️ Nhập tên đi!';return}

  const m=pass.match(/^123456(\d+)$/);
  if(!m){err.textContent='❌ Sai mật khẩu! VD: 1234561';return}
  const num=parseInt(m[1]);

  const {data:gameData,error:e1}=await supabase
    .from('game_state').select('*').eq('id',GAME_ID).single();
  if(e1||!gameData){err.textContent='❌ Không kết nối được game!';return}

  const max=gameData.max_players||6;
  if(num<1||num>max){err.textContent=`❌ Số không hợp lệ! Tối đa ${max} người`;return}

  const pid=`player${num}`;

  const {data:existing}=await supabase
    .from('player_sessions').select('player_id,player_name')
    .eq('player_id',pid).eq('game_id',GAME_ID).maybeSingle();

  if(existing){
    if(existing.player_name!==name){
      err.textContent=`❌ Người chơi ${num} đã đăng nhập với tên khác!`;return
    }
    await supabase.from('player_sessions')
      .update({last_seen:new Date().toISOString()})
      .eq('player_id',pid).eq('game_id',GAME_ID);
    me={id:pid,name,num};
    sessionStorage.setItem('rcv_ses',JSON.stringify({pid,name,num}));
    enterGame(name,gameData);
    return;
  }

  const {data:allSess}=await supabase
    .from('player_sessions').select('player_id').eq('game_id',GAME_ID);
  if(allSess&&allSess.length>=max){err.textContent=`❌ Phòng đã đầy!`;return}

  const {error:e2}=await supabase.from('player_sessions').insert([{
    player_id:pid,game_id:GAME_ID,player_name:name,last_seen:new Date().toISOString()
  }]);
  if(e2){err.textContent=`❌ ${e2.message}`;return}

  const scores={...(gameData.scores||{})};
  const players={...(gameData.players||{})};
  scores[pid]={id:pid,name,score:scores[pid]?.score||0};
  players[pid]={id:pid,name,score:players[pid]?.score||0};
  await supabase.from('game_state').update({scores,players}).eq('id',GAME_ID);

  me={id:pid,name,num};
  sessionStorage.setItem('rcv_ses',JSON.stringify({pid,name,num}));
  enterGame(name,{...gameData,scores,players});
}

function enterGame(name,gameData){
  document.getElementById('hdrName').textContent=name;
  document.getElementById('loginWrap').style.display='none';
  document.getElementById('gamePanel').style.display='block';
  gs=gameData;
  render(gameData);
  startRealtime();
  startKeepalive();
}

function startKeepalive(){
  setInterval(async()=>{
    if(!me)return;
    await supabase.from('player_sessions')
      .update({last_seen:new Date().toISOString()})
      .eq('player_id',me.id).eq('game_id',GAME_ID);
  },25000);
}

async function doLogout(){
  if(!me)return;
  sessionStorage.removeItem('rcv_ses');
  await supabase.from('player_sessions').delete()
    .eq('player_id',me.id).eq('game_id',GAME_ID);
  me=null; gs=null;
  document.getElementById('gamePanel').style.display='none';
  document.getElementById('loginWrap').style.display='flex';
  document.getElementById('inpName').value='';
  document.getElementById('inpPass').value='';
  document.getElementById('errMsg').textContent='';
}

/* ─── RENDER ─── */
function render(state){
  gs=state;
  document.getElementById('hdrScore').textContent=(state.scores?.[me?.id]?.score??0)+' điểm';
  renderBell(state);
  renderContent(state);
}

/* ─── CHUÔNG ─── */
function renderBell(state){
  canRing=false; canAnswer=false;

  if(!state.game_started){
    setBell('s-wait','⏸ Chờ Admin bắt đầu','');
    return;
  }

  if(state.can_ring && !state.current_ringer){
    canRing=true;
    answered=false; myPickedIdx=null;
    setBell('s-ready','🔔 NHẤN ĐỂ RUNG CHUÔNG!','c-ready');
    return;
  }

  if(state.current_ringer===me?.id){
    canAnswer=true;
    setBell('s-mine','🎯 BẠN ĐÃ RUNG! Chọn đáp án!','c-mine');
    return;
  }

  if(state.current_ringer){
    const n=state.scores?.[state.current_ringer]?.name||'Người khác';
    setBell('s-other',`🔔 ${n} rung trước rồi!`,'c-other');
    return;
  }

  setBell('s-wait','⏸ Đang chờ...','');
}

function setBell(cls,txt,color){
  document.getElementById('bellWrap').className='bell-wrap '+cls;
  const s=document.getElementById('bellStatus');
  s.textContent=txt; s.className='bell-status '+color;
}

/* ─── NỘI DUNG ─── */
function renderContent(state){
  const area=document.getElementById('content');

  if(state.questions?.length && state.current_question_index>=state.questions.length){
    renderResultScreen(state, area);
    return;
  }

  if(!state.game_started || !state.question_shown || !state.questions?.length){
    area.innerHTML='<div class="wait-box"><span class="ico">🔔</span>Chờ Admin bắt đầu lượt...</div>';
    return;
  }

  const q=state.questions[state.current_question_index];
  const labels=['A','B','C','D','E','F'];
  const isMine=state.current_ringer===me?.id;
  const someoneElseRang=state.current_ringer && !isMine;

  let optsSection='';
  if(isMine){
    const optHtml=(q.options||[]).map((opt,i)=>{
      const pickable=!answered;
      const cls='opt '+(pickable?'can-pick':'locked');
      return `<div class="${cls}" onclick="pickOpt(${i})">
        <span class="lbl">${labels[i]}</span>
        <span>${opt.replace(/^[A-D]\.\s*/,'')}</span>
      </div>`;
    }).join('');
    optsSection=`<div class="opts" id="optsGrid">${optHtml}</div><div class="fb" id="fb"></div>`;
  } else if(someoneElseRang){
    const ringerName=state.scores?.[state.current_ringer]?.name||'Người khác';
    optsSection=`<div style="text-align:center;padding:14px;border-radius:11px;
      background:rgba(255,107,53,.1);border:1.5px solid rgba(255,107,53,.3);margin-bottom:11px;
      font-family:'Baloo 2',cursive;font-size:16px;font-weight:800;color:#ff6b35">
      🔔 <strong>${ringerName}</strong> đang trả lời... Chờ Admin chấm điểm</div>`;
  } else {
    optsSection=`<div style="text-align:center;padding:14px;border-radius:11px;
      background:rgba(35,209,96,.08);border:1.5px solid rgba(35,209,96,.2);margin-bottom:11px;
      font-size:14px;color:var(--green);font-weight:700">
      🟢 Nhấn chuông để giành quyền trả lời!</div>`;
  }

  const rows=Object.values(state.scores||{})
    .sort((a,b)=>b.score-a.score)
    .map(p=>{
      let cls='score-row';
      if(p.id===me?.id)               cls+=' me';
      if(p.id===state.current_ringer) cls+=' ringer';
      return `<div class="${cls}">
        <span class="score-row-name">${p.id===me?.id?'⭐ ':''}${p.name}</span>
        <span class="score-row-pts">${p.score}</span>
      </div>`;
    }).join('');

  const dimStyle=someoneElseRang?'opacity:.45;pointer-events:none;':'';
  area.innerHTML=`
    <div class="q-wrap" style="${dimStyle}">
      <div class="q-num">CÂU ${state.current_question_index+1} / ${state.questions.length}</div>
      <div class="q-text">${q.text}</div>
    </div>
    ${optsSection}
    <div class="scores-mini">
      <div class="scores-mini-title">🏆 Bảng điểm</div>${rows}
    </div>`;

  if(answered && isMine) applyFb();
}

/* ─── MÀN HÌNH KẾT QUẢ ─── */
let resultShown = false;
function renderResultScreen(state, area){
  const scores=Object.values(state.scores||{}).sort((a,b)=>b.score-a.score);
  const medals=['🥇','🥈','🥉'];
  const rankCls=['rk-1','rk-2','rk-3'];
  const myRank=scores.findIndex(p=>p.id===me?.id);

  const rows=scores.map((p,i)=>{
    const isMe=p.id===me?.id;
    const icon=i<3?medals[i]:`<span style="color:var(--text2);font-size:13px;font-weight:800">${i+1}</span>`;
    const meCls=isMe?'rk-me':'';
    return `<tr class="${rankCls[i]||''} ${meCls}">
      <td>${icon}</td>
      <td class="rn">${p.name}${isMe?'<span class="my-badge">BẠN</span>':''}</td>
      <td>${p.score} <span style="font-size:11px;opacity:.6">đ</span></td>
    </tr>`;
  }).join('');

  const myScore=scores.find(p=>p.id===me?.id)?.score||0;
  let rankMsg='';
  if(myRank===0)      rankMsg=`🥇 Bạn đứng <strong>NHẤT</strong>! Xuất sắc!`;
  else if(myRank===1) rankMsg=`🥈 Bạn đứng <strong>nhì</strong>! Rất tốt!`;
  else if(myRank===2) rankMsg=`🥉 Bạn đứng <strong>ba</strong>! Giỏi lắm!`;
  else                rankMsg=`Bạn đứng thứ <strong>${myRank+1}</strong> với ${myScore} điểm`;

  area.innerHTML=`
  <div class="result-screen">
    <div class="result-header">
      <span class="result-trophy">🏆</span>
      <div class="result-title-cl">KẾT THÚC!</div>
      <div class="result-sub-cl">${rankMsg}</div>
    </div>
    <table class="result-tbl">
      <thead><tr>
        <th></th><th style="text-align:left">Người chơi</th><th style="text-align:right">Điểm</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;

  if(!resultShown){
    resultShown=true;
    launchConfettiClient();
  }
}

function launchConfettiClient(){
  const wrap=document.getElementById('confWrap');
  if(!wrap) return;
  wrap.innerHTML='';
  const colors=['#FFD700','#FFA500','#23d160','#ff6b35','#a855f7','#3b82f6','#ec4899'];
  for(let i=0;i<70;i++){
    const el=document.createElement('div');
    el.className='cf';
    const size=5+Math.random()*9;
    el.style.cssText=`left:${Math.random()*100}%;width:${size}px;height:${size*.6}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      animation-duration:${1.6+Math.random()*2}s;animation-delay:${Math.random()*1.2}s`;
    wrap.appendChild(el);
  }
  setTimeout(()=>{wrap.innerHTML='';},4500);
}

/* ─── CHỌN ĐÁP ÁN ─── */
async function pickOpt(idx){
  if(!canAnswer||answered||!gs)return;
  const q=gs.questions[gs.current_question_index];
  if(!q)return;

  answered=true; canAnswer=false;
  myPickedIdx=idx;

  const grid=document.getElementById('optsGrid');
  if(grid){
    grid.querySelectorAll('.opt').forEach((el,i)=>{
      el.className='opt locked';
      if(i===idx)el.classList.add('picked');
    });
  }
  applyFb();

  await supabase.from('game_state')
    .update({ player_answer: idx })
    .eq('id', GAME_ID)
    .eq('current_ringer', me.id);
}

function applyFb(){
  const fb=document.getElementById('fb');
  if(!fb)return;
  fb.className='fb ok';
  fb.textContent='⏳ Đã chọn — Đang chấm điểm tự động...';
}

// FIX: Banner kết quả dùng scorePerQ đồng bộ từ server
function showResultBanner(correct, correctAnswer){
  const banner=document.createElement('div');
  banner.style.cssText=`position:fixed;top:0;left:0;right:0;bottom:0;z-index:999;
    display:flex;align-items:center;justify-content:center;
    background:${correct?'rgba(35,209,96,.92)':'rgba(255,56,96,.92)'};
    font-family:'Baloo 2',cursive;font-size:32px;font-weight:800;color:#fff;
    text-align:center;padding:20px;flex-direction:column;gap:12px`;
  banner.innerHTML=correct
    ? `<div style="font-size:64px">🎉</div><div>CHÍNH XÁC!</div><div style="font-size:18px;opacity:.85">+${scorePerQ} điểm</div>`
    : `<div style="font-size:64px">❌</div><div>SAI RỒI!</div><div style="font-size:16px;opacity:.85">Đáp án đúng: ${correctAnswer}</div>`;
  document.body.appendChild(banner);
  setTimeout(()=>banner.remove(), 2500);
}

/* ─── NHẤN CHUÔNG ─── */
async function onBellClick(){
  if(!canRing||!me)return;

  const {data:fresh}=await supabase
    .from('game_state')
    .select('game_started,can_ring,current_ringer')
    .eq('id',GAME_ID).single();

  if(!fresh?.game_started||!fresh?.can_ring||fresh?.current_ringer){
    setBell('s-other','⏳ Đã có người rung trước!','c-other');
    canRing=false; return;
  }

  const {error}=await supabase.from('game_state')
    .update({current_ringer:me.id,can_ring:false})
    .eq('id',GAME_ID);

  if(!error){
    canRing=false;
    iRang=true;
    setBell('s-mine','🔔 ĐÃ RUNG CHUÔNG!','c-mine');
    playSound();
  }
}

/* ─── ÂM THANH ─── */
let lastRinger=null;
let iRang=false;
function playSound(){
  const a=document.getElementById('snd');
  if(!a)return;
  a.currentTime=0;
  a.play().catch(()=>{});
}

/* ─── REALTIME ─── */
function startRealtime(){
  supabase.channel('rcv_'+me.id)
    .on('postgres_changes',
      {event:'UPDATE',schema:'public',table:'game_state'},
      async ({new:s})=>{
        if(s.id!==GAME_ID) return;

        const prevGs = gs;

        if(s.current_ringer && s.current_ringer!==lastRinger){
          lastRinger=s.current_ringer;
          if(iRang){
            iRang=false;
          } else {
            playSound();
          }
        }
        if(!s.current_ringer){ lastRinger=null; iRang=false; }

        const {data:full}=await supabase
          .from('game_state').select('*').eq('id',GAME_ID).single();
        if(!full) return;

        // FIX: Đồng bộ scorePerQ từ server nếu có
        // (Nếu sau này thêm cột score_per_q vào DB thì uncomment dòng sau)
        // if(full.score_per_q) scorePerQ = full.score_per_q;

        if(prevGs && (
          full.current_question_index!==prevGs.current_question_index ||
          (full.game_started && !prevGs.game_started)
        )){
          answered=false; myPickedIdx=null; resultShown=false;
        }

        if(prevGs?.current_ringer===me?.id && !full.current_ringer && myPickedIdx!==null){
          const prevQ=(prevGs.questions||[])[prevGs.current_question_index];
          if(prevQ){
            const wasCorrect=(prevQ.options[myPickedIdx]===prevQ.correctAnswer);
            showResultBanner(wasCorrect, prevQ.correctAnswer);
          }
          myPickedIdx=null;
        }

        render(full);
      })
    .subscribe(st=>{
      if(st==='SUBSCRIBED'){
        supabase.from('game_state').select('*').eq('id',GAME_ID).single()
          .then(({data})=>{ if(data) render(data); });
      }
    });
}

/* ─── TỰ KHÔI PHỤC SESSION KHI RELOAD ─── */
window.addEventListener('load',async()=>{
  const saved=sessionStorage.getItem('rcv_ses');
  if(!saved)return;
  let parsed;
  try{ parsed=JSON.parse(saved); }catch{ sessionStorage.removeItem('rcv_ses');return; }
  const {pid,name,num}=parsed;

  const {data:gameData}=await supabase
    .from('game_state').select('*').eq('id',GAME_ID).single();
  if(!gameData){ sessionStorage.removeItem('rcv_ses'); return; }

  await supabase.from('player_sessions')
    .update({last_seen:new Date().toISOString()})
    .eq('player_id',pid).eq('game_id',GAME_ID);

  me={id:pid,name,num};
  enterGame(name,gameData);
});
</script>
